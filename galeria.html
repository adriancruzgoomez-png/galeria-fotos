<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería de fotos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { overflow: hidden; }
  body { font-family: "Segoe UI", Arial, sans-serif; background: #ffffff; padding: 12px; }

  #estado { text-align: center; font-size: 13px; color: #aaa; margin-bottom: 12px; min-height: 18px; }

  /* Vista álbumes — 2 columnas ~40% cada una */
  .albums-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }

  .album-card {
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    height: 280px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .album-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 24px rgba(0,0,0,0.2);
  }

  .album-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .album-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.1) 55%, transparent 100%);
  }

  .album-info {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 18px 20px;
  }

  .album-nombre {
    font-size: 20px;
    font-weight: 500;
    color: white;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  .album-count {
    font-size: 14px;
    color: rgba(255,255,255,0.75);
    margin-top: 4px;
  }

  /* Vista fotos masonry */
  #vista-album { display: none; }

  #btn-volver {
    display: inline-flex; align-items: center; gap: 5px;
    background: none; border: none; color: #1e73be; font-size: 13px;
    cursor: pointer; margin-bottom: 12px; padding: 0;
  }
  #btn-volver:hover { text-decoration: underline; }
  #titulo-album { font-size: 17px; font-weight: 400; color: #2e2e2e; margin-bottom: 14px; }

  .masonry { column-count: 4; column-gap: 8px; }
  @media (max-width: 900px) { .masonry { column-count: 3; } }
  @media (max-width: 600px) { .masonry { column-count: 2; } .albums-grid { grid-template-columns: 1fr; } }
  @media (max-width: 360px) { .masonry { column-count: 1; } }

  .masonry-item {
    break-inside: avoid; margin-bottom: 8px;
    border-radius: 6px; overflow: hidden; cursor: pointer;
  }
  .masonry-item img { width: 100%; display: block; transition: opacity 0.2s; }
  .masonry-item:hover img { opacity: 0.85; }

  #vacio { text-align: center; color: #aaa; font-size: 14px; margin-top: 30px; display: none; }

  /* Lightbox */
  #lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.93); align-items: center; justify-content: center; z-index: 200;
  }
  #lightbox.visible { display: flex; }
  #lightbox-img { max-width: 90vw; max-height: 90vh; border-radius: 4px; object-fit: contain; }
  #lightbox-cerrar {
    position: absolute; top: 14px; right: 18px;
    color: white; font-size: 30px; cursor: pointer; background: none; border: none; line-height: 1;
  }
  #lightbox-prev, #lightbox-next {
    position: absolute; top: 50%; transform: translateY(-50%);
    color: white; font-size: 36px; cursor: pointer; background: none; border: none;
    padding: 12px; opacity: 0.7; transition: opacity 0.2s;
  }
  #lightbox-prev:hover, #lightbox-next:hover { opacity: 1; }
  #lightbox-prev { left: 6px; }
  #lightbox-next { right: 6px; }
  #lightbox-counter {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.6); font-size: 13px;
  }
</style>
</head>
<body>

<div id="contenido">
  <div id="estado">Cargando...</div>

  <div id="vista-albums">
    <div class="albums-grid" id="albums-grid"></div>
    <div id="vacio">No hay álbumes todavía.</div>
  </div>

  <div id="vista-album">
    <button id="btn-volver" onclick="volverAlbums()">← Volver</button>
    <div id="titulo-album"></div>
    <div class="masonry" id="masonry-grid"></div>
  </div>
</div>

<div id="lightbox">
  <button id="lightbox-cerrar" onclick="cerrarLightbox()">×</button>
  <button id="lightbox-prev" onclick="lightboxNav(-1)">‹</button>
  <img id="lightbox-img" src="" alt="">
  <button id="lightbox-next" onclick="lightboxNav(1)">›</button>
  <div id="lightbox-counter"></div>
</div>

<script>
  const WORKER_URL = "https://galeria-fotos-eoitudela.adrian-cruz-goomez.workers.dev";
  let albums = [];
  let fotosActuales = [];
  let lightboxIndex = 0;

  const observer = new ResizeObserver(() => {
    const altura = document.getElementById("contenido").offsetHeight;
    window.parent.postMessage({ tipo: "altura-galeria", altura: altura + 24 }, "*");
  });
  observer.observe(document.getElementById("contenido"));

  cargarAlbums();

  async function cargarAlbums() {
    try {
      const res = await fetch(WORKER_URL + "/albums");
      albums = await res.json();
      document.getElementById("estado").textContent = "";
      mostrarAlbums();
    } catch (e) {
      document.getElementById("estado").textContent = "Error al cargar.";
    }
  }

  function mostrarAlbums() {
    const grid = document.getElementById("albums-grid");
    const vacio = document.getElementById("vacio");
    grid.innerHTML = "";
    document.getElementById("vista-albums").style.display = "block";
    document.getElementById("vista-album").style.display = "none";

    if (!albums || albums.length === 0) {
      vacio.style.display = "block";
      return;
    }
    vacio.style.display = "none";
    albums.forEach(album => {
      const card = document.createElement("div");
      card.className = "album-card";
      card.innerHTML = `
        <img src="${album.portada}" alt="${album.nombre}">
        <div class="album-overlay"></div>
        <div class="album-info">
          <div class="album-nombre">${album.nombre}</div>
          <div class="album-count">${album.fotos.length} foto${album.fotos.length !== 1 ? "s" : ""}</div>
        </div>
      `;
      card.onclick = () => abrirAlbum(album);
      grid.appendChild(card);
    });
  }

  function abrirAlbum(album) {
    fotosActuales = album.fotos;
    document.getElementById("titulo-album").textContent = album.nombre;
    document.getElementById("vista-albums").style.display = "none";
    document.getElementById("vista-album").style.display = "block";

    const grid = document.getElementById("masonry-grid");
    grid.innerHTML = "";
    album.fotos.forEach((foto, i) => {
      const div = document.createElement("div");
      div.className = "masonry-item";
      const img = document.createElement("img");
      img.src = foto.url;
      img.alt = foto.filename || "Foto";
      div.appendChild(img);
      div.onclick = () => abrirLightbox(i);
      grid.appendChild(div);
    });
  }

  function volverAlbums() {
    document.getElementById("vista-albums").style.display = "block";
    document.getElementById("vista-album").style.display = "none";
  }

  function abrirLightbox(index) {
    lightboxIndex = index;
    actualizarLightbox();
    document.getElementById("lightbox").classList.add("visible");
  }

  function actualizarLightbox() {
    document.getElementById("lightbox-img").src = fotosActuales[lightboxIndex].url;
    document.getElementById("lightbox-counter").textContent =
      (lightboxIndex + 1) + " / " + fotosActuales.length;
  }

  function cerrarLightbox() {
    document.getElementById("lightbox").classList.remove("visible");
  }

  function lightboxNav(dir) {
    lightboxIndex = (lightboxIndex + dir + fotosActuales.length) % fotosActuales.length;
    actualizarLightbox();
  }

  document.getElementById("lightbox").addEventListener("click", function(e) {
    if (e.target === this) cerrarLightbox();
  });

  document.addEventListener("keydown", function(e) {
    if (!document.getElementById("lightbox").classList.contains("visible")) return;
    if (e.key === "ArrowRight") lightboxNav(1);
    if (e.key === "ArrowLeft") lightboxNav(-1);
    if (e.key === "Escape") cerrarLightbox();
  });
</script>

</body>
</html>
