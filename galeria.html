<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería de fotos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Segoe UI", Arial, sans-serif; background: #ffffff; padding: 16px; }
  #estado { text-align: center; font-size: 13px; color: #aaa; margin-bottom: 16px; min-height: 18px; }
  .galeria { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
  .foto { border-radius: 10px; overflow: hidden; border: 1px solid #dcdcdc; aspect-ratio: 1; }
  .foto img { width: 100%; height: 100%; object-fit: cover; display: block; }
  #vacio { text-align: center; color: #aaa; font-size: 15px; margin-top: 40px; display: none; }
</style>
</head>
<body>

<div id="estado">Cargando fotos...</div>
<div class="galeria" id="galeria"></div>
<div id="vacio">No hay fotos todavía.</div>

<script>
  const WORKER_URL = "https://galeria-fotos-eoitudela.adrian-cruz-goomez.workers.dev";

  async function cargarFotos() {
    try {
      const res = await fetch(WORKER_URL + "/photos");
      const fotos = await res.json();
      const galeria = document.getElementById("galeria");
      const vacio = document.getElementById("vacio");
      document.getElementById("estado").textContent = "";
      galeria.innerHTML = "";
      if (!fotos || fotos.length === 0) {
        vacio.style.display = "block";
        return;
      }
      vacio.style.display = "none";
      fotos.forEach(foto => {
        const div = document.createElement("div");
        div.className = "foto";
        const img = document.createElement("img");
        img.src = foto.url;
        img.alt = foto.filename || "Foto";
        img.loading = "lazy";
        div.appendChild(img);
        galeria.appendChild(div);
      });
    } catch (e) {
      document.getElementById("estado").textContent = "Error al cargar las fotos.";
    }
  }

  cargarFotos();
</script>

</body>
</html>
