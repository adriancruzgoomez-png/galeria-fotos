<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administración de galería</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Segoe UI", Arial, sans-serif; background: #f5f5f5; padding: 24px; }
  h1 { font-size: 20px; font-weight: 400; color: #2e2e2e; margin-bottom: 20px; text-align: center; }

  #btn-nuevo-album {
    display: block; margin: 0 auto 24px; padding: 11px 26px;
    background: #1e73be; color: white; border: none; border-radius: 8px;
    font-size: 14px; cursor: pointer;
  }
  #btn-nuevo-album:hover { background: #155d99; }

  #estado { text-align: center; font-size: 13px; color: #777; margin-bottom: 20px; min-height: 18px; }

  .albums-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .album-card { background: white; border-radius: 10px; overflow: hidden; border: 1px solid #dcdcdc; position: relative; }
  .album-card img { width: 100%; height: 160px; object-fit: cover; display: block; }
  .album-info { padding: 10px 12px 12px; }
  .album-nombre { font-size: 14px; font-weight: 500; color: #2e2e2e; margin-bottom: 4px; }
  .album-count { font-size: 12px; color: #888; }
  .album-acciones { display: flex; gap: 6px; padding: 0 12px 12px; }
  .btn-accion { flex: 1; padding: 6px 0; font-size: 12px; border: 1px solid #dcdcdc; background: white; border-radius: 6px; cursor: pointer; color: #444; }
  .btn-accion:hover { background: #f0f0f0; }
  .btn-accion.danger { color: #c00; border-color: #f5c6c6; }
  .btn-accion.danger:hover { background: #fff0f0; }

  #vacio { text-align: center; color: #aaa; font-size: 15px; margin-top: 40px; display: none; }

  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100; }
  .modal.visible { display: flex; }
  .modal-box { background: white; border-radius: 12px; padding: 28px 32px; width: 360px; text-align: center; }
  .modal-box h3 { font-size: 17px; margin-bottom: 16px; color: #2e2e2e; }
  .modal-box input[type="text"] { width: 100%; padding: 9px 12px; border: 1px solid #dcdcdc; border-radius: 8px; font-size: 14px; margin-bottom: 12px; }
  .modal-box button { width: 100%; padding: 10px; background: #1e73be; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; margin-bottom: 8px; }
  .modal-box button:hover { background: #155d99; }
  .btn-cancelar { background: transparent !important; color: #777 !important; font-size: 13px !important; }

  .fotos-portada { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; max-height: 300px; overflow-y: auto; margin-bottom: 12px; }
  .foto-portada-item { aspect-ratio: 1; border-radius: 6px; overflow: hidden; cursor: pointer; border: 2px solid transparent; }
  .foto-portada-item.seleccionada { border-color: #1e73be; }
  .foto-portada-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .foto-portada-item video { width: 100%; height: 100%; object-fit: cover; display: block; }

  #btn-confirmar { display: block; margin: 0 auto 16px; padding: 10px 22px; background: #2e7d32; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
  #btn-confirmar:hover { background: #1b5e20; }
  #btn-confirmar.hidden { display: none; }

  /* Barra de progreso vídeo */
  #progreso-wrap { display: none; margin-bottom: 16px; }
  #progreso-label { font-size: 12px; color: #777; margin-bottom: 6px; text-align: center; }
  #progreso-bar-bg { height: 6px; background: #e0e0e0; border-radius: 3px; overflow: hidden; }
  #progreso-bar { height: 100%; background: #1e73be; width: 0%; transition: width 0.3s; border-radius: 3px; }
</style>
</head>
<body>

<h1>Administración de galería</h1>
<button id="btn-nuevo-album" onclick="mostrarModalAlbum()">+ Añadir álbum</button>
<button id="btn-confirmar" class="hidden" onclick="recogerFotos()">✓ Ya seleccioné las fotos</button>
<div id="progreso-wrap">
  <div id="progreso-label">Subiendo vídeo...</div>
  <div id="progreso-bar-bg"><div id="progreso-bar"></div></div>
</div>
<div id="estado"></div>
<div class="albums-grid" id="albums-grid"></div>
<div id="vacio">No hay álbumes todavía.</div>

<!-- Modal nuevo álbum -->
<div class="modal" id="modal-album">
  <div class="modal-box">
    <h3>Nuevo álbum</h3>
    <input type="text" id="input-nombre" placeholder="Nombre del álbum" onkeydown="if(event.key==='Enter')iniciarAlbum()">
    <button onclick="iniciarAlbum()">Seleccionar fotos y vídeos</button>
    <button class="btn-cancelar" onclick="cerrarModal('modal-album')">Cancelar</button>
  </div>
</div>

<!-- Modal editar álbum -->
<div class="modal" id="modal-editar">
  <div class="modal-box">
    <h3>Editar álbum</h3>
    <input type="text" id="input-nombre-editar" placeholder="Nombre del álbum">
    <p style="font-size:13px;color:#777;margin-bottom:8px;text-align:left;">Elige la foto de portada:</p>
    <div class="fotos-portada" id="fotos-portada"></div>
    <button onclick="guardarEdicion()">Guardar cambios</button>
    <button class="btn-cancelar" onclick="cerrarModal('modal-editar')">Cancelar</button>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script>
  const WORKER_URL = "https://galeria-fotos-eoitudela.adrian-cruz-goomez.workers.dev";
  const CLIENT_ID = "586063066601-atpi1nf1em0il7v15spn2ao1gvk87ial.apps.googleusercontent.com";

  let tokenClient = null;
  let accessToken = null;
  let pickerWindow = null;
  let currentSessionId = null;
  let nombreAlbumPendiente = null;
  let albumSlugPendiente = null;
  let albumEditando = null;
  let portadaSeleccionada = null;

  cargarAlbums();

  async function cargarAlbums() {
    setEstado("Cargando álbumes...");
    try {
      const res = await fetch(WORKER_URL + "/albums");
      const albums = await res.json();
      mostrarAlbums(albums);
      setEstado("");
    } catch (e) {
      setEstado("Error al cargar los álbumes.");
    }
  }

  function mostrarAlbums(albums) {
    const grid = document.getElementById("albums-grid");
    const vacio = document.getElementById("vacio");
    grid.innerHTML = "";
    if (!albums || albums.length === 0) { vacio.style.display = "block"; return; }
    vacio.style.display = "none";
    albums.forEach(album => {
      const card = document.createElement("div");
      card.className = "album-card";
      card.innerHTML = `
        <img src="${album.portada}" alt="${album.nombre}">
        <div class="album-info">
          <div class="album-nombre">${album.nombre}</div>
          <div class="album-count">${album.fotos.length} elemento${album.fotos.length !== 1 ? "s" : ""}</div>
        </div>
        <div class="album-acciones">
          <button class="btn-accion" onclick="abrirEditar('${album.id}')">✏️ Editar</button>
          <button class="btn-accion danger" onclick="eliminarAlbum('${album.id}')">🗑 Eliminar</button>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function setEstado(msg) { document.getElementById("estado").textContent = msg; }

  function mostrarModalAlbum() {
    document.getElementById("modal-album").classList.add("visible");
    document.getElementById("input-nombre").value = "";
    setTimeout(() => document.getElementById("input-nombre").focus(), 100);
  }

  function cerrarModal(id) { document.getElementById(id).classList.remove("visible"); }

  // ── EDITAR ÁLBUM ──
  async function abrirEditar(albumId) {
    const res = await fetch(WORKER_URL + "/albums");
    const albums = await res.json();
    albumEditando = albums.find(a => a.id === albumId);
    if (!albumEditando) return;

    portadaSeleccionada = albumEditando.portada;
    document.getElementById("input-nombre-editar").value = albumEditando.nombre;

    const grid = document.getElementById("fotos-portada");
    grid.innerHTML = "";
    albumEditando.fotos.forEach(foto => {
      const div = document.createElement("div");
      div.className = "foto-portada-item" + (foto.url === portadaSeleccionada ? " seleccionada" : "");
      if (foto.tipo === "video") {
        div.innerHTML = `<video src="${foto.url}" muted></video>`;
      } else {
        div.innerHTML = `<img src="${foto.url}" alt="">`;
      }
      div.onclick = () => {
        if (foto.tipo === "video") return; // No se puede elegir vídeo como portada
        portadaSeleccionada = foto.url;
        document.querySelectorAll(".foto-portada-item").forEach(el => el.classList.remove("seleccionada"));
        div.classList.add("seleccionada");
      };
      grid.appendChild(div);
    });

    document.getElementById("modal-editar").classList.add("visible");
  }

  async function guardarEdicion() {
    if (!albumEditando) return;
    const nuevoNombre = document.getElementById("input-nombre-editar").value.trim();
    if (!nuevoNombre) return;
    try {
      const res = await fetch(WORKER_URL + "/albums/" + albumEditando.id, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nombre: nuevoNombre, portada: portadaSeleccionada })
      });
      const data = await res.json();
      if (data.ok) {
        cerrarModal("modal-editar");
        setEstado("✓ Álbum actualizado.");
        await cargarAlbums();
      } else {
        setEstado("Error al guardar.");
      }
    } catch (e) {
      setEstado("Error: " + e.message);
    }
  }

  // ── NUEVO ÁLBUM ──
  function iniciarAlbum() {
    const nombre = document.getElementById("input-nombre").value.trim();
    if (!nombre) return;
    nombreAlbumPendiente = nombre;
    albumSlugPendiente = nombre.toLowerCase().replace(/[^a-z0-9]/g, "-") + "-" + Date.now();
    cerrarModal("modal-album");

    pickerWindow = window.open("about:blank", "picker_google", "width=950,height=700,left=100,top=100");

    if (!tokenClient) {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: "https://www.googleapis.com/auth/photospicker.mediaitems.readonly",
        callback: async (resp) => {
          if (resp.error) { setEstado("Error de autenticación."); if (pickerWindow) pickerWindow.close(); return; }
          accessToken = resp.access_token;
          await iniciarSesionPicker();
        }
      });
    }
    tokenClient.requestAccessToken();
  }

  async function iniciarSesionPicker() {
    setEstado("Preparando selector...");
    try {
      const sesRes = await fetch("https://photospicker.googleapis.com/v1/sessions", {
        method: "POST",
        headers: { "Authorization": "Bearer " + accessToken, "Content-Type": "application/json" }
      });
      const sesion = await sesRes.json();
      if (!sesion.pickerUri) { setEstado("Error: " + JSON.stringify(sesion)); if (pickerWindow) pickerWindow.close(); return; }
      currentSessionId = sesion.id;
      pickerWindow.location.href = sesion.pickerUri;
      document.getElementById("btn-confirmar").classList.remove("hidden");
      document.getElementById("btn-nuevo-album").style.display = "none";
      setEstado('Selecciona fotos y vídeos del álbum "' + nombreAlbumPendiente + '". Cuando termines pulsa el botón verde.');
    } catch (e) {
      setEstado("Error: " + e.message);
      if (pickerWindow) pickerWindow.close();
    }
  }

  async function recogerFotos() {
    if (!currentSessionId || !accessToken) { setEstado("Error: no hay sesión activa."); return; }
    if (pickerWindow && !pickerWindow.closed) pickerWindow.close();
    document.getElementById("btn-confirmar").classList.add("hidden");
    document.getElementById("btn-nuevo-album").style.display = "block";

    setEstado("Obteniendo elementos seleccionados...");
    try {
      const res = await fetch("https://photospicker.googleapis.com/v1/mediaItems?sessionId=" + currentSessionId, {
        headers: { "Authorization": "Bearer " + accessToken }
      });
      const data = await res.json();

      if (!data.mediaItems || data.mediaItems.length === 0) {
        setEstado("No se encontraron elementos. ¿Confirmaste la selección?");
        return;
      }

      const mediaItems = [];
      const videos = [];

      for (const item of data.mediaItems) {
        const esVideo = item.mediaFile?.mimeType?.startsWith("video/") || false;
        if (esVideo) {
          videos.push(item);
        } else {
          mediaItems.push({
            id: item.id,
            filename: item.mediaFile?.filename?.replace(/\.[^/.]+$/, "") || item.id,
            baseUrl: item.mediaFile?.baseUrl || "",
            tipo: "foto"
          });
        }
      }

      // Subir vídeos a R2 directamente desde el navegador
      const videosSubidos = [];
      for (let i = 0; i < videos.length; i++) {
        const video = videos[i];
        const filename = video.mediaFile?.filename || (video.id + ".mp4");
        setEstado(`Descargando vídeo ${i + 1} de ${videos.length}: ${filename}...`);

        try {
          // Descargar vídeo de Google
          const videoUrl = video.mediaFile?.baseUrl + "=dv";
          const videoRes = await fetch(videoUrl, {
            headers: { "Authorization": "Bearer " + accessToken }
          });

          if (!videoRes.ok) { setEstado(`Error descargando vídeo ${filename}`); continue; }

          // Mostrar progreso
          document.getElementById("progreso-wrap").style.display = "block";
          document.getElementById("progreso-label").textContent = `Subiendo vídeo ${i + 1} de ${videos.length}: ${filename}`;
          document.getElementById("progreso-bar").style.width = "0%";

          // Subir al Worker → R2 en streaming
          const uploadRes = await fetch(
            `${WORKER_URL}/video/${albumSlugPendiente}/${encodeURIComponent(filename)}`,
            {
              method: "PUT",
              headers: { "Content-Type": video.mediaFile?.mimeType || "video/mp4" },
              body: videoRes.body,
              duplex: "half"
            }
          );

          document.getElementById("progreso-bar").style.width = "100%";

          if (uploadRes.ok) {
            const result = await uploadRes.json();
            videosSubidos.push({
              id: video.id,
              filename: filename,
              url: result.url,
              tipo: "video"
            });
          }
        } catch (e) {
          setEstado(`Error subiendo vídeo: ${e.message}`);
        }
      }

      document.getElementById("progreso-wrap").style.display = "none";

      // Combinar fotos y vídeos
      const todosLosItems = [...mediaItems, ...videosSubidos];

      if (todosLosItems.length === 0) {
        setEstado("No se pudo procesar ningún elemento.");
        return;
      }

      setEstado(`Guardando álbum con ${mediaItems.length} foto(s) y ${videosSubidos.length} vídeo(s)...`);

      const uploadRes = await fetch(WORKER_URL + "/albums", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nombre: nombreAlbumPendiente, mediaItems: todosLosItems, accessToken })
      });

      const result = await uploadRes.json();
      if (result.ok) {
        setEstado('✓ Álbum "' + result.album.nombre + '" creado con ' + result.guardadas + ' elementos.');
        await cargarAlbums();
      } else {
        setEstado("Error: " + JSON.stringify(result));
      }

      currentSessionId = null;
      nombreAlbumPendiente = null;
      albumSlugPendiente = null;
    } catch (e) {
      setEstado("Error: " + e.message);
    }
  }

  async function eliminarAlbum(albumId) {
    if (!confirm("¿Seguro que quieres eliminar este álbum?")) return;
    try {
      await fetch(WORKER_URL + "/albums/" + albumId, { method: "DELETE" });
      setEstado("Álbum eliminado.");
      await cargarAlbums();
    } catch (e) {
      setEstado("Error al eliminar el álbum.");
    }
  }
</script>

</body>
</html>
